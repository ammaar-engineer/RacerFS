services:
  MinIO:
    image: minio/minio
    container_name: "minio-container"
    ports:
      - "9000:9000"  # MinIO API
      - "9001:9001"  # MinIO Console (Web UI)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      GOMAXPROCS: "1"
      MINIO_STORAGE_CLASS_STANDARD: "EC:0"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 512M

  minio-init:
    image: minio/mc
    depends_on:
      - MinIO
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://MinIO:9000 minioadmin minioadmin123); do echo 'Waiting for MinIO...'; sleep 1; done;
      if ! /usr/bin/mc ls local/racerfs-bucket > /dev/null 2>&1; then
        /usr/bin/mc mb local/racerfs-bucket;
        /usr/bin/mc anonymous set download local/racerfs-bucket;
        echo 'Bucket racerfs-bucket created with public-read policy.';
      else
        echo 'Bucket racerfs-bucket already exists.';
      fi
      "

volumes:
  minio_data:
    driver: local
