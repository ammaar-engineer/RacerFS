services:
  postgres:
    image: postgres:16-alpine
    container_name: racerfs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: racerfs
      POSTGRES_PASSWORD: racerfs123
      POSTGRES_DB: racerfs_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U racerfs -d racerfs_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  MinIO:
    image: minio/minio
    container_name: "minio-container"
    ports:
      - "9000:9000"  # MinIO API
      - "9001:9001"  # MinIO Console (Web UI)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      GOMAXPROCS: "1"
      MINIO_STORAGE_CLASS_STANDARD: "EC:0"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 512M

  minio-init:
    image: minio/mc
    depends_on:
      - MinIO
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://MinIO:9000 minioadmin minioadmin123); do echo 'Waiting for MinIO...'; sleep 1; done;
      if ! /usr/bin/mc ls local/racerfs_bucket > /dev/null 2>&1; then
        /usr/bin/mc mb local/racerfs_bucket;
        /usr/bin/mc anonymous set download local/racerfs_bucket;
        echo 'Bucket racerfs_bucket created with public-read policy.';
      else
        echo 'Bucket racerfs_bucket already exists.';
      fi
      "

  redis:
    image: redis:7-alpine
    container_name: racerfs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  minio_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
